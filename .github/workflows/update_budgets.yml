name: Update Budget Data

on:
  schedule:
    # Run on 5th of every month at 10:00 UTC
    - cron: '0 10 5 * *'
  workflow_dispatch:
    inputs:
      data_type:
        description: 'Type of data to update'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - income
          - expense
      date_from:
        description: 'Start date (YYYY-MM), leave empty for auto-detect'
        required: false
        type: string
      date_to:
        description: 'End date (YYYY-MM), leave empty for latest'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Download existing data from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data/processed
          
          # Try to download from latest release
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          
          if [ -n "$LATEST_TAG" ]; then
            echo "Downloading from release: $LATEST_TAG"
            # Download parquet zip files and extract them
            gh release download "$LATEST_TAG" --pattern "*_parquet.zip" --dir data/processed || echo "No parquet zip files in release"
            
            # Extract parquet files from zips
            cd data/processed
            for zipfile in *_parquet.zip; do
              if [ -f "$zipfile" ]; then
                unzip -o "$zipfile"
                rm "$zipfile"
              fi
            done
            cd ../..
          else
            echo "No previous releases found, starting fresh"
          fi
      
      - name: Run budget updater
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          cd src
          
          # Build command arguments
          ARGS="--type ${{ github.event.inputs.data_type || 'all' }}"
          ARGS="$ARGS --output-dir ../data/processed"
          
          if [ -n "${{ github.event.inputs.date_from }}" ]; then
            ARGS="$ARGS --date-from ${{ github.event.inputs.date_from }}"
          fi
          
          if [ -n "${{ github.event.inputs.date_to }}" ]; then
            ARGS="$ARGS --date-to ${{ github.event.inputs.date_to }}"
          fi
          
          # Add S3 upload if configured
          if [ -n "$S3_BUCKET" ]; then
            ARGS="$ARGS --s3-folder FinKazna/data_budgets_146"
          fi
          
          python -m budgets.main $ARGS
      
      - name: Generate version tag
        id: version
        run: |
          VERSION="v$(date +%Y.%m.%d)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if any zip files were generated
          if ls data/processed/*.zip 1>/dev/null 2>&1; then
            gh release create ${{ steps.version.outputs.version }} \
              data/processed/*_parquet.zip \
              data/processed/*_csv.zip \
              data/processed/*_xlsx.zip \
              --title "Budget Data ${{ steps.version.outputs.version }}" \
              --notes "Automated budget data update for $(date +%Y-%m)" \
              --latest
          else
            echo "No new data files to release"
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: budget-data-${{ steps.version.outputs.version }}
          path: |
            data/processed/*_parquet.zip
            data/processed/*_csv.zip
            data/processed/*_xlsx.zip
          retention-days: 30

