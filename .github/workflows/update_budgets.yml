name: Update Budget Data

on:
  schedule:
    # Run on 5th of every month at 10:00 UTC
    - cron: '0 10 5 * *'
  workflow_dispatch:
    inputs:
      data_type:
        description: 'Type of data to update'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - income
          - expense
      date_from:
        description: 'Start date (YYYY-MM), leave empty for auto-detect'
        required: false
        type: string
      date_to:
        description: 'End date (YYYY-MM), leave empty for latest'
        required: false
        type: string

env:
  PYTHON_VERSION: '3.11'

jobs:
  update-data:
    runs-on: self-hosted
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download existing data from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

          mkdir -p data/processed

          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')

          if [ -z "$LATEST_TAG" ]; then
            echo "No releases found, starting fresh"
            exit 0
          fi

          echo "Found release: $LATEST_TAG"
          gh release download "$LATEST_TAG" --pattern "data_budget_*_parquet.zip" --dir data/processed

          cd data/processed
          for zipfile in data_budget_*_parquet.zip; do
            if [ -f "$zipfile" ]; then
              unzip -o "$zipfile"
              rm "$zipfile"
            fi
          done
          cd ../..

          echo "Parquet files in data/processed:"
          ls data/processed/data_budget_*.parquet 2>/dev/null || echo "  (none found)"
      
      - name: Run budget updater
        id: updater
        env:
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
        run: |
          cd src
          
          # Build command arguments
          ARGS="--type ${{ github.event.inputs.data_type || 'all' }}"
          ARGS="$ARGS --output-dir ../data/processed"
          
          if [ -n "${{ github.event.inputs.date_from }}" ]; then
            ARGS="$ARGS --date-from ${{ github.event.inputs.date_from }}"
          fi
          
          if [ -n "${{ github.event.inputs.date_to }}" ]; then
            ARGS="$ARGS --date-to ${{ github.event.inputs.date_to }}"
          fi
          
          # Add S3 upload if configured
          if [ -n "$S3_BUCKET" ]; then
            ARGS="$ARGS --s3-folder FinKazna/data_budgets_146"
          fi
          
          # Run and capture output to parse added months
          python -m budgets.main $ARGS 2>&1 | tee ../updater_output.txt
          
          # Parse added months from output (format: "Loading from YYYY-MM to YYYY-MM")
          cd ..
          ADDED_MONTHS=$(grep -o "Loading from [0-9-]* to [0-9-]*" updater_output.txt | head -1 || echo "")
          if [ -n "$ADDED_MONTHS" ]; then
            # Extract the date range
            FROM_DATE=$(echo "$ADDED_MONTHS" | grep -o "[0-9]\{4\}-[0-9]\{2\}" | head -1)
            TO_DATE=$(echo "$ADDED_MONTHS" | grep -o "[0-9]\{4\}-[0-9]\{2\}" | tail -1)
            echo "added_months=Added months: ${FROM_DATE} — ${TO_DATE}" >> $GITHUB_OUTPUT
          else
            echo "added_months=" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

          BASE_DATE=$(date +%Y.%m.%d)
          BASE_VERSION="v${BASE_DATE}"
          
          # Check if a release with today's date already exists
          EXISTING=$(gh release list --json tagName -q '.[].tagName' | grep "^v${BASE_DATE}" || echo "")
          
          if [ -z "$EXISTING" ]; then
            VERSION="$BASE_VERSION"
          else
            # Count existing releases for today and increment
            COUNT=$(echo "$EXISTING" | wc -l | tr -d ' ')
            VERSION="v${BASE_DATE}($((COUNT + 1)))"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

          # Check if any zip files were generated
          if ls data/processed/data_budget_*.zip 1>/dev/null 2>&1; then
            # Build release notes with added months info
            NOTES="Automated budget data update"
            if [ -n "${{ steps.updater.outputs.added_months }}" ]; then
              NOTES=$(printf "%s\n\n%s" "$NOTES" "${{ steps.updater.outputs.added_months }}")
            fi
            
            gh release create "${{ steps.version.outputs.version }}" \
              data/processed/data_budget_*_parquet.zip \
              data/processed/data_budget_*_csv.zip \
              data/processed/data_budget_*_xlsx.zip \
              --title "Budget Data ${{ steps.version.outputs.version }}" \
              --notes "$NOTES" \
              --latest
          else
            echo "No new data files to release"
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: budget-data-${{ steps.version.outputs.version }}
          path: |
            data/processed/data_budget_*_parquet.zip
            data/processed/data_budget_*_csv.zip
            data/processed/data_budget_*_xlsx.zip
          retention-days: 30

